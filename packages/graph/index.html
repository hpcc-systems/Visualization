<!doctype html>
<html style="color-scheme: light;">

<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        h1 {
            text-align: center;
            margin-top: 50px;

        #placeholder,
        #placeholderDark,
        #placeholder1,
        #placeholder2,
        #placeholder3,
        #placeholder4 {
            width: 100%;
            height: 500px;
            background-color: #fff;
            margin-top: 20px;
        }

        #placeholder {
            color-scheme: light;

        #placeholderDark {
            color-scheme: dark;
        }

    <script type="module">
        import "@hpcc-js/common/font-awesome/css/font-awesome.min.css";

<body onresize="doResize()">
    <h1>ESM Quick Test</h1>
    <div id="placeholder"></div>
    <script type="module">
        import { testGraphviz as Test } from "./tests/index.ts";

        const graphvizWidget = await Test();
        graphvizWidget
            .target("placeholder")
            .render()
            ;
        window.addEventListener("keydown", e => {
            if (e.ctrlKey && e.key.toLowerCase() === "u") {
                e.preventDefault();
                const g = graphvizWidget.data();
                const nodes = g.nodeNames();
                console.log(nodes);
                if (nodes.length > 0) {
                    g.removeNode(nodes[nodes.length - 1]);
                    graphvizWidget.render();
                }
                const edges = g.edges();
                console.log(edges);
            }
        });

    </script>
    <div id="placeholderDark"></div>
    <script type="module">
        import { testGraphviz as Test } from "./tests/index.ts";

        const graphvizWidgetDark = await Test();
        graphvizWidgetDark
            .target("placeholderDark")
            .render()
            ;
    </script>
    <div id="placeholder1"></div>
    <script type="module">
        import { Test6 as Test } from "./tests/index.ts";

        new Test()
            .target("placeholder1")
            .tabNavigation(true)
            .render()
            ;
    </script>
    <h1>ESM Quick Test</h1>

    <div id="placeholder3"></div>

            .render()

    </script>

        }
    </script>
</body>
