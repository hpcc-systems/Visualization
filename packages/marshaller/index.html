<!doctype html>
<html>

<head>
    <title>@hpcc-js/marshaller</title>
    <style>
        body {
            padding: 0px;
            margin: 8px;
            overflow: hidden;
        }

        #placeholder {
            width: 100%;
            height: 100vh;
        }
    </style>
    <script type="module">
        import "@hpcc-js/common/font-awesome/css/font-awesome.min.css";
    </script>
</head>

<body>
    <div id="placeholder"></div>
    <script type="module">
        import { edit, view } from "./tests/index.ts";

        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get("mode") || "dashboard";

        switch (mode) {
            case "edit":
                edit("placeholder");
                break;
            case "view":
            default:
                view("placeholder");
                break;
        }
    </script>
</body>

</html>
